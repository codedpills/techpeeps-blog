name: Newsletter on publish

# Auto: when a NEWLY ADDED post lands on main, send its teaser to subscribers.
# Manual: run from the Actions tab for a specific post (defaults to creating a
# DRAFT in MailerLite so you can review before sending).
on:
  push:
    branches: ["main"]
    paths:
      - "src/content/blog/**.md"
  workflow_dispatch:
    inputs:
      slug:
        description: "Post slug (filename in src/content/blog without .md)"
        required: true
        type: string
      send:
        description: "Send now? Leave off to create a draft in MailerLite to review."
        type: boolean
        default: false

concurrency:
  group: newsletter-${{ github.ref }}
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need history to diff before..after (push)

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install PyYAML requests

      - name: Resolve target post(s) and send mode
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FILE="src/content/blog/${{ github.event.inputs.slug }}.md"
            if [ ! -f "$FILE" ]; then
              echo "::error::Post not found: $FILE"; exit 1
            fi
            echo "files=$FILE" >> "$GITHUB_OUTPUT"
            echo "send=${{ github.event.inputs.send }}" >> "$GITHUB_OUTPUT"
            echo "Manual run: $FILE (send=${{ github.event.inputs.send }})"
          else
            BEFORE="${{ github.event.before }}"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              echo "First push or no base ref — skipping to avoid mass send."
              echo "files=" >> "$GITHUB_OUTPUT"; exit 0
            fi
            FILES=$(git diff --diff-filter=A --name-only "$BEFORE" "${{ github.sha }}" -- 'src/content/blog/*.md' | tr '\n' ' ')
            echo "Newly added: $FILES"
            echo "files=$FILES" >> "$GITHUB_OUTPUT"
            echo "send=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Send / draft newsletters
        if: steps.resolve.outputs.files != ''
        env:
          # Non-key values belong in Variables, but accept Secrets too so a
          # wrong-tab entry doesn't silently break the run. API key stays secret.
          MAILERLITE_API_KEY: ${{ secrets.MAILERLITE_API_KEY }}
          MAILERLITE_GROUP_ID: ${{ vars.MAILERLITE_GROUP_ID || secrets.MAILERLITE_GROUP_ID }}
          NEWSLETTER_FROM: ${{ vars.NEWSLETTER_FROM || secrets.NEWSLETTER_FROM }}
          NEWSLETTER_FROM_NAME: ${{ vars.NEWSLETTER_FROM_NAME || secrets.NEWSLETTER_FROM_NAME }}
          SITE_URL: ${{ vars.SITE_URL || secrets.SITE_URL }}
        run: |
          SENDFLAG=""
          if [ "${{ steps.resolve.outputs.send }}" = "true" ]; then SENDFLAG="--send"; fi
          for f in ${{ steps.resolve.outputs.files }}; do
            echo "== $f (send=${{ steps.resolve.outputs.send }}) =="
            python pipeline/send_newsletter.py "$f" $SENDFLAG
          done
