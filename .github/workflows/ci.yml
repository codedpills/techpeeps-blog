name: CI

# Build-check every PR and push so a malformed post (bad frontmatter, leftover
# placeholders) fails CI before it can be merged. Reinforces the PR approval gate.
on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg (for the clip silent-audio check)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          npm ci
          pip install PyYAML

      - name: Verify posts against transcripts (quotes verbatim, frontmatter, clip)
        run: python pipeline/verify_post.py --all

      - name: Build site (fails on invalid frontmatter)
        run: npm run build
