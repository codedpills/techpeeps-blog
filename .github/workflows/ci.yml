name: CI

# Build-check + content-check every PR and push. The content check NEVER blocks
# PR creation or the Cloudflare preview — it posts an explanatory PR comment and
# only turns the check red on HARD errors (fabricated quote, bad frontmatter,
# placeholder, clip-with-audio). Warnings are advisory. Whether a red check
# blocks merge is up to branch-protection settings.
on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      REPORT_PATH: ${{ github.workspace }}/verify-report.md
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so a PR can be diffed against its base commit (we only
          # content-check the posts THIS PR changed, not every post in the repo).
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg (for the clip silent-audio check)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          npm ci
          pip install PyYAML

      - name: Run content verifier (writes report, never fails here)
        id: verify
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set +e
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Only the blog posts this PR adds/changes — never previously merged
            # ones. "$BASE_SHA...HEAD" resolves to the PR's own diff.
            mapfile -t CHANGED < <(git diff --name-only --diff-filter=d \
              "$BASE_SHA"...HEAD -- 'src/content/blog/*.md')
            if [ "${#CHANGED[@]}" -eq 0 ]; then
              echo "No blog posts changed in this PR — nothing to content-check."
              python pipeline/verify_post.py --md "$REPORT_PATH"
            else
              printf 'Checking changed post(s):\n'; printf '  %s\n' "${CHANGED[@]}"
              python pipeline/verify_post.py "${CHANGED[@]}" --md "$REPORT_PATH"
            fi
          else
            # push to main: verify everything, so a bad merge to main is caught.
            python pipeline/verify_post.py --all --md "$REPORT_PATH"
          fi
          echo "code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Comment verifier report on the PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- techpeeps-content-check -->';
            let report = '_No report produced._';
            try { report = fs.readFileSync(process.env.REPORT_PATH, 'utf8'); } catch (e) {}
            const body = `${marker}\n${report}\n\n_This check does not block the PR or its Cloudflare preview. Fix any ❌ errors before merging._`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Build site (fails on invalid frontmatter / bad SITE_URL)
        # Build with the SAME SITE_URL as production so a bad value (or invalid
        # frontmatter) fails the PR check here instead of at deploy time.
        env:
          SITE_URL: ${{ vars.SITE_URL || secrets.SITE_URL }}
        run: npm run build

      - name: Fail the check on hard content errors
        if: steps.verify.outputs.code != '0'
        run: |
          echo "::error::Content verification found hard errors — see the PR comment for details and fixes."
          exit 1
